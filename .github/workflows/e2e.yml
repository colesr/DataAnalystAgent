name: E2E smoke

on:
  pull_request:
    paths:
      - "nextjs/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: dda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/dda_test
      AUTH_SECRET: test-secret
      # Don't actually call any LLM in CI — these tests don't touch /api/agent
      ANTHROPIC_API_KEY: ""
      GEMINI_API_KEY: ""

    defaults:
      run:
        working-directory: nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nextjs/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Run migrations
        run: npm run db:migrate

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:e2e
