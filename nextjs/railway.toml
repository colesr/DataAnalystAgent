# Railway uses Nixpacks by default which auto-detects Next.js.
# This file just makes the build/start commands explicit and adds a healthcheck.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
